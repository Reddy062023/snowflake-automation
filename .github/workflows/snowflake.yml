name: Snowflake Automation (Docker)

# Manual trigger only
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Run SnowSQL using official Docker image
      - name: Run SnowSQL in Docker
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PASSWORD: ${{ secrets.SNOWSQL_PASSWORD }}
        run: |
          docker run --rm \
            -v $GITHUB_WORKSPACE:/workspace \
            snowflakedb/snowsql \
            snowsql -a $SNOWSQL_ACCOUNT \
                    -u $SNOWSQL_USER \
                    -p $SNOWSQL_PASSWORD \
                    -d MY_DB \
                    -s PUBLIC \
                    -w COMPUTE_WH \
                    -f /workspace/scripts/upload_csv.sql