name: Snowflake Automation (Manual)

# Only manual trigger — no automatic schedule
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Install SnowSQL CLI on Ubuntu runner
      - name: Install SnowSQL
        run: |
          # Download a valid Linux SnowSQL installer
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.4/linux_x86_64/snowsql-1.4.19-linux_x86_64.bash -O install_snowsql.sh
          chmod +x install_snowsql.sh
          ./install_snowsql.sh --yes
          export PATH=$PATH:$HOME/snowflake/snowsql

      # 3️⃣ Run your SnowSQL script
      - name: Run upload CSV script
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PASSWORD: ${{ secrets.SNOWSQL_PASSWORD }}
        run: |
          # Execute SnowSQL using the secrets
          snowsql -a $SNOWSQL_ACCOUNT \
                  -u $SNOWSQL_USER \
                  -p $SNOWSQL_PASSWORD \
                  -d MY_DB \
                  -s PUBLIC \
                  -w COMPUTE_WH \
                  -f scripts/upload_csv.sql