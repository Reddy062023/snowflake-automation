name: Snowflake Automation

# Trigger workflow only manually
on:
  workflow_dispatch:    # allows manual run from GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install SnowSQL CLI
      - name: Install SnowSQL
        run: |
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/latest/linux_x86_64/snowsql-linux_x86_64.bash -O install_snowsql.sh
          chmod +x install_snowsql.sh
          ./install_snowsql.sh --yes
          export PATH=$PATH:$HOME/snowflake/snowsql

      # Step 3: Run your SnowSQL script
      - name: Run SnowSQL
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          snowsql -a $SNOWSQL_ACCOUNT -u $SNOWSQL_USER -p $SNOWSQL_PWD \
            -d MY_DB -s PUBLIC -w COMPUTE_WH \
            -f scripts/upload_csv.sql