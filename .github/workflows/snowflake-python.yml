name: Snowflake Automation

# Trigger: manual for testing + daily schedule
on:
  workflow_dispatch:   # allows manual run
  schedule:
    - cron: "0 2 * * *" # daily at 2 AM UTC

jobs:
  upload_csv:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Debug secrets (optional, safe)
      - name: Check Snowflake secrets
        run: |
          echo "Checking Snowflake secrets..."
          [[ -z "$SNOWSQL_ACCOUNT" ]] && echo "SNOWSQL_ACCOUNT missing!" || echo "Account OK"
          [[ -z "$SNOWSQL_USER" ]] && echo "SNOWSQL_USER missing!" || echo "User OK"
          [[ -z "$SNOWSQL_PASSWORD" ]] && echo "SNOWSQL_PASSWORD missing!" || echo "Password OK"
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PASSWORD: ${{ secrets.SNOWSQL_PASSWORD }}

      # Step 3: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 4: Install dependencies (pandas + pyarrow first!)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow
          pip install snowflake-connector-python

      # Step 5: Run Python script
      - name: Upload CSV to Snowflake
        run: python scripts/upload_csv.py
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PASSWORD: ${{ secrets.SNOWSQL_PASSWORD }}