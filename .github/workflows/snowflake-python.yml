name: Snowflake Automation (Python Safe)

# Trigger:
# - Manual trigger for testing
# - Scheduled daily at 2 AM UTC
on:
  workflow_dispatch: # manual trigger
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC

jobs:
  upload_csv:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install Python packages
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-connector-python pandas

      # 4️⃣ Check Snowflake secrets
      - name: Check Snowflake Secrets
        run: |
          echo "Checking Snowflake secrets..."
          if [ -z "$SNOWSQL_ACCOUNT" ]; then echo "ERROR: SNOWSQL_ACCOUNT is empty"; exit 1; fi
          if [ -z "$SNOWSQL_USER" ]; then echo "ERROR: SNOWSQL_USER is empty"; exit 1; fi
          if [ -z "$SNOWSQL_PASSWORD" ]; then echo "ERROR: SNOWSQL_PASSWORD is empty"; exit 1; fi
          echo "✅ All secrets are set."
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PASSWORD: ${{ secrets.SNOWSQL_PASSWORD }}

      # 5️⃣ Run Python script to upload CSV
      - name: Upload CSV to Snowflake
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PASSWORD: ${{ secrets.SNOWSQL_PASSWORD }}
        run: |
          python scripts/upload_csv.py